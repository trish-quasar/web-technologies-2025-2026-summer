<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>University Club Membership Registration</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1 id="main-title">University Club Membership Registration</h1>

    <form id="club_form" class="form-box" method="post" novalidate>
      <div class="main-sections">
        <fieldset id="personal_information">
          <legend>Personal Information</legend>

          <div class="personal-fields">
            <div class="personal-row">
              <label for="first_name">First Name:</label>

              <div>
                <input
                  type="text"
                  id="first_name"
                  name="first_name"
                  placeholder="Enter first name"
                  required
                />

                <small id="firstNameError" class="error"></small>
              </div>
            </div>

            <div class="personal-row">
              <label for="last_name">Last Name:</label>

              <div>
                <input
                  type="text"
                  id="last_name"
                  name="last_name"
                  placeholder="Enter last name"
                  required
                />

                <small id="lastNameError" class="error"></small>
              </div>
            </div>

            <div class="personal-row">
              <label for="email">Email Address:</label>

              <div>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="name@example.com"
                  required
                />

                <small id="emailError" class="error"></small>
              </div>
            </div>

            <div class="personal-row">
              <label for="password">Password:</label>

              <div>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="8 characters, uppercase, lowercase and number"
                  required
                />

                <small id="passwordError" class="error"></small>
              </div>
            </div>

            <div class="personal-row">
              <span class="main-label">Gender:</span>

              <div>
                <div class="radio-options">
                  <label>
                    <input type="radio" name="gender" value="Male" />
                    Male
                  </label>

                  <label>
                    <input type="radio" name="gender" value="Female" />
                    Female
                  </label>

                  <label>
                    <input type="radio" name="gender" value="Other" />
                    Other
                  </label>
                </div>

                <small id="genderError" class="error"></small>
              </div>
            </div>
          </div>
        </fieldset>

        <fieldset id="club_information">
          <legend>Club Information</legend>

          <p class="section-note">Select the clubs you are interested in:</p>

          <div class="club-list">

          <small id="clubError" class="error"></small>

          <div class="category-row">
            <label for="club_category">Club Category:</label>

            <div>
              <select id="club_category" name="club_category" required>
                <option value="">-- Select Club Category --</option>

                <option value="arts_culture_media">
                  Arts, Culture and Media
                </option>

                <option value="business_finance">
                  Business, Finance and Leadership
                </option>

                <option value="computing_technology">
                  Computing and Technology
                </option>

                <option value="engineering">
                  Engineering and Professional
                </option>

                <option value="law_academic">Law, Research and Academic</option>

                <option value="welfare_environment">
                  Social Welfare and Environment
                </option>

                <option value="international">
                  International and Student Development
                </option>

                <option value="gaming">Gaming and eSports</option>
              </select>

              <small id="categoryError" class="error"></small>
            </div>
          </div>
        </fieldset>
      </div>

      <fieldset id="additional_information">
        <legend>Additional Information</legend>

        <div class="reason-row">
          <label for="join_reason"> Why do you want to join? </label>

          <div>
            <textarea
              id="join_reason"
              name="join_reason"
              placeholder="Write at least 20 characters"
              required
            ></textarea>

            <small id="reasonError" class="error"></small>
          </div>
        </div>
      </fieldset>

      <button type="submit" id="submit_button">Submit Form</button>
    </form>

    <script src="script.js"></script>

</html>
